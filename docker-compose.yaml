services:
  postgres:
    image: postgres:17
    container_name: unityhealth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unityhealth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: